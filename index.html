<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#13312e" />
  <meta name="description" content="A complete guide to Cornwall-on-Hudson, New York and the surrounding Hudson Highlands — for new residents and curious neighbors. Where to eat, shop and hike; who to call for repairs; schools, healthcare, events and how to get set up. Centered on the village." />
  <meta property="og:title" content="The Cornwall-on-Hudson Guide" />
  <meta property="og:description" content="Everything a new resident needs — the river, the mountain, the village and the towns within reach." />
  <meta property="og:type" content="website" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <title>The Cornwall-on-Hudson Guide — for new neighbors</title>
</head>
<body>
  <a class="skip-link" href="#orientation">Skip to guide</a>

  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a class="wordmark" href="#top" aria-label="The Cornwall-on-Hudson Guide — home">
        <span class="wm-mark" aria-hidden="true"></span>
        <span class="wm-text">
          <span class="wm-title">Cornwall&#8209;on&#8209;Hudson</span>
          <span class="wm-sub">A guide for new neighbors</span>
        </span>
      </a>

      <div class="header-tools">
        <div class="search" role="search">
          <span class="search-ic" aria-hidden="true">⌕</span>
          <input id="search" type="search" placeholder="Search the whole guide…" autocomplete="off" aria-label="Search the guide" />
          <button id="searchClear" class="search-clear" type="button" aria-label="Clear search" hidden>×</button>
        </div>
        <button class="ai-btn" id="aiBtn" type="button" aria-haspopup="dialog">AI caution</button>
      </div>

      <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="sectionNav">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="section-nav" id="sectionNav" aria-label="Guide sections"></nav>
  </header>

  <main id="top">
    <!-- Hero + all sections are injected by app.js -->
    <div id="guide"></div>
  </main>

  <footer class="site-footer" id="colophon"></footer>

  <!-- AI caution popover -->
  <div class="popover-backdrop" id="aiBackdrop" hidden></div>
  <div class="popover" id="aiPopover" role="dialog" aria-modal="true" aria-labelledby="aiTitle" hidden></div>

  <!-- Back to top -->
  <button class="to-top" id="toTop" type="button" aria-label="Back to top" hidden>↑</button>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
